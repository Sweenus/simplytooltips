modLoader = "javafml"
loaderVersion = "[47,)"
license = "Timefall Development License 1.2"

[[mods]]
modId = "simplytooltips"
version = "${version}"
displayName = "Simply Tooltips"
authors = "Sweenus"
description = '''
Modern data driven tooltip renderer for Simply mods. Optionally available for other vanilla and modded items.
'''

[[dependencies.simplytooltips]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.simplytooltips]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.simplytooltips]]
modId = "architectury"
mandatory = true
versionRange = "[9,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.simplytooltips]]
modId = "fzzy_config"
mandatory = true
versionRange = "[0.6.6,)"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "simplytooltips.mixins.json"
